name: pytest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
            python-version: "3.11"
      - run: uv sync --extra-index-url https://download.pytorch.org/whl/cpu
      - run: uv run pytest --no-cov
