name: CI                          # shown in GitHub UI

on:                               # when to trigger
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  static-analysis:                           # job name
    runs-on: ubuntu-latest        # which machine to use
    steps:
      - uses: actions/checkout@v6 # clone your repo
      - uses: astral-sh/setup-uv@v6  # install uv
        with:
          python-version: "3.11"
      - run: uv sync --extra-index-url https://download.pytorch.org/whl/cpu
      - run: uv run ruff check litevit/ train.py eval.py sweep.py
      - run: uv run ruff format --check litevit/ train.py eval.py sweep.py
      - run: uv run mypy litevit/ scripts/ train.py eval.py sweep.py

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --extra-index-url https://download.pytorch.org/whl/cpu
      - run: uv run pytest --no-cov
