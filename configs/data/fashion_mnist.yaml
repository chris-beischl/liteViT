_target_: litevit.data.fashion_mnist.FashionMNISTDataModule

train_transform:
  _target_: torchvision.transforms.Compose
  transforms:
    - _target_: torchvision.transforms.ToTensor
    - _target_: torchvision.transforms.Normalize
      mean: [0.5]
      std: [0.5]

eval_transform:
  _target_: torchvision.transforms.Compose
  transforms:
    - _target_: torchvision.transforms.ToTensor
    - _target_: torchvision.transforms.Normalize
      mean: [0.5]
      std: [0.5]

split_perc: [0.85, 0.15, 0.0]
num_workers: 8
batch_size: 256
pin_memory: False
persistent_workers: True

img_size: [28, 28]
num_channels: 1
num_classes: 10